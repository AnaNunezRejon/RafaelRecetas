<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receta - Recetario Diego Morales</title>
  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
</head>
<body>

  <a href="./index.html" class="back-button" aria-label="Volver al recetario">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><line x1="216" y1="128" x2="40" y2="128"/><polyline points="96 72 40 128 96 184"/></svg>
  </a>

  <div id="recipe-detail">
    <div class="recipe-hero">
      <img id="rd-hero-img" src="" alt="" loading="eager">
      <div class="recipe-hero-overlay"></div>
    </div>

    <div class="recipe-header">
      <div class="recipe-header-inner">
        <h1 class="recipe-title" id="rd-title"></h1>
        <p class="recipe-description" id="rd-description"></p>
        <div class="info-bar">
          <div class="info-col">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><circle cx="128" cy="128" r="96"/><polyline points="128 72 128 128 168 148"/></svg>
            <span class="info-label">Tiempo</span>
            <span class="info-value" id="rd-tiempo"></span>
          </div>
          <div class="info-col">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M72 48v56a24 24 0 0 0 24 24"/><path d="M72 128v80"/><path d="M120 48v80a24 24 0 0 0 24 24"/><path d="M120 152v56"/><path d="M168 48v56a24 24 0 0 1-24 24"/><path d="M168 128v80"/><path d="M216 48v80a24 24 0 0 1-24 24"/><path d="M216 152v56"/></svg>
            <span class="info-label">Dificultad</span>
            <span class="info-value" id="rd-dificultad"></span>
          </div>
          <div class="info-col">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><circle cx="88" cy="80" r="40"/><circle cx="168" cy="80" r="40"/><path d="M24 192c0-48 32-72 64-72s64 24 64 72"/><path d="M168 120c32 0 64 24 64 72"/></svg>
            <span class="info-label">Comensales</span>
            <span class="info-value" id="rd-comensales"></span>
          </div>
          <div class="info-col">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M128 216c-40 0-72-48-72-104S88 24 128 24s72 40 72 88-32 104-72 104z"/><path d="M128 216V120"/><path d="M128 120c20 0 40-16 40-40"/><path d="M128 120c-20 0-40-16-40-40"/></svg>
            <span class="info-label">Tipo</span>
            <span class="info-value" id="rd-tipo"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="ingredients-section">
      <div class="ingredients-section-inner">
        <h2 class="section-heading">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M48 112V88a32 32 0 0 1 32-32h96a32 32 0 0 1 32 32v24"/><path d="M48 112h160v32a32 32 0 0 1-32 32H80a32 32 0 0 1-32-32v-32z"/><path d="M88 176v16a40 40 0 0 0 80 0v-16"/></svg>
          Ingredientes
          <span class="ingredient-count" id="rd-ing-count"></span>
        </h2>
        <div class="ingredients-list" id="rd-ingredients"></div>
      </div>
    </div>

    <div class="steps-section">
      <div class="steps-section-inner">
        <h2 class="section-heading">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><circle cx="128" cy="128" r="96"/><polyline points="128 72 128 128 168 148"/></svg>
          Preparacion
        </h2>
        <div class="steps-list" id="rd-steps"></div>
      </div>
    </div>

    <div class="final-image-section" id="rd-final-img-section" style="display:none;">
      <img id="rd-final-img" src="" alt="">
      <p class="final-caption" id="rd-final-caption"></p>
    </div>

    <footer class="page-footer">
      <p>por Rafa&eacute;l N&uacute;&ntilde;ez</p>
      <p class="footer-sub">Recetario Diego Morales &copy; 2026</p>
    </footer>
  </div>

  <script>
    const icons = {
      clock: '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><circle cx="128" cy="128" r="96"/><polyline points="128 72 128 128 168 148"/></svg>',
      download: '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M200 176v24a16 16 0 0 1-16 16H72a16 16 0 0 1-16-16v-24"/><polyline points="88 136 128 176 168 136"/><line x1="128" y1="176" x2="128" y2="40"/></svg>'
    };

    function getSlugFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('r');
    }

    function capitalize(str) { return str.charAt(0).toUpperCase() + str.slice(1); }

    function renderRecipeDetail(receta) {
      document.title = receta.titulo + ' - Recetario Diego Morales';

      const heroImg = document.getElementById('rd-hero-img');
      heroImg.src = receta.imagen;
      heroImg.alt = receta.titulo;

      document.getElementById('rd-title').textContent = receta.titulo;
      document.getElementById('rd-description').textContent = receta.descripcion;
      document.getElementById('rd-tiempo').textContent = receta.tiempoLabel;
      document.getElementById('rd-dificultad').textContent = receta.dificultad;
      document.getElementById('rd-comensales').textContent = receta.comensales;
      document.getElementById('rd-tipo').textContent = capitalize(receta.tipo);

      document.getElementById('rd-ing-count').textContent = receta.ingredientes.length;

      const ingList = document.getElementById('rd-ingredients');
      ingList.innerHTML = receta.ingredientes.map((ing, i) =>
        '<div class="ingredient-row">' +
          '<input type="checkbox" class="ingredient-checkbox" id="ing-' + i + '">' +
          '<label class="ingredient-label" for="ing-' + i + '">' +
            '<span class="ingredient-name">' + ing.nombre + '</span>' +
            '<span class="ingredient-qty">' + ing.cantidad + '</span>' +
          '</label>' +
        '</div>'
      ).join('');

      const stepsList = document.getElementById('rd-steps');
      stepsList.innerHTML = receta.pasos.map((paso, i) =>
        '<div class="step-card">' +
          '<div class="step-number">' + (i + 1) + '</div>' +
          '<p class="step-text">' + paso + '</p>' +
        '</div>'
      ).join('');

      const finalSection = document.getElementById('rd-final-img-section');
      const finalImg = document.getElementById('rd-final-img');
      if (receta.imagenFinal || receta.imagen) {
        finalSection.style.display = 'block';
        finalImg.src = receta.imagenFinal || receta.imagen;
        finalImg.alt = 'Resultado final: ' + receta.titulo;
        document.getElementById('rd-final-caption').textContent = receta.titulo + ' - Listo para servir';
      } else {
        finalSection.style.display = 'none';
      }

      if (receta.pdf) {
        const downloadBtn = document.createElement('a');
        downloadBtn.href = receta.pdf;
        downloadBtn.className = 'sticky-download-btn';
        downloadBtn.target = '_blank';
        downloadBtn.innerHTML = icons.download + ' Descargar receta en PDF';
        document.body.appendChild(downloadBtn);
      }
    }

    function initRecipeDetail() {
      const slug = getSlugFromUrl();
      if (!slug) {
        document.body.innerHTML = '<div style="text-align:center;padding:60px 24px;font-family:sans-serif;"><h1>Receta no encontrada</h1><p>No se especifico ninguna receta. <a href="./index.html" style="color:#6B8E23;">Volver al recetario</a></p></div>';
        return;
      }

      fetch('./data.json')
        .then(r => r.json())
        .then(data => {
          const receta = data.recetas.find(r => r.slug === slug);
          if (!receta) {
            document.body.innerHTML = '<div style="text-align:center;padding:60px 24px;font-family:sans-serif;"><h1>Receta no encontrada</h1><p>La receta "' + slug + '" no existe. <a href="./index.html" style="color:#6B8E23;">Volver al recetario</a></p></div>';
            return;
          }
          renderRecipeDetail(receta);
        })
        .catch(err => {
          console.error('Error cargando receta:', err);
          document.body.innerHTML = '<div style="text-align:center;padding:60px 24px;font-family:sans-serif;"><h1>Error</h1><p>No se pudo cargar la receta. <a href="./index.html" style="color:#6B8E23;">Volver al recetario</a></p></div>';
        });
    }

    document.addEventListener('DOMContentLoaded', initRecipeDetail);
  </script>

</body>
</html>
