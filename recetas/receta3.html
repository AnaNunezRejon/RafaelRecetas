<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Receta | Recetario Rafaél Núñez</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

  <a href="../index.html" class="back-button" aria-label="Volver al inicio">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><line x1="216" y1="128" x2="40" y2="128"/><polyline points="96 72 40 128 96 184"/></svg>
  </a>

  <section class="recipe-hero">
    <img src="" alt="" id="recipe-hero-img" loading="eager">
    <div class="recipe-hero-overlay"></div>
  </section>

  <section class="recipe-header">
    <div class="recipe-header-inner">
      <h1 class="recipe-title" id="recipe-title"></h1>
      <p class="recipe-description" id="recipe-description"></p>
      <div class="info-bar">
        <div class="info-col">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><circle cx="128" cy="128" r="96"/><polyline points="128 72 128 128 168 148"/></svg>
          <span class="info-label">Tiempo</span>
          <span class="info-value" id="info-tiempo"></span>
        </div>
        <div class="info-col">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M48 192h160"/><path d="M48 192l-8-80 48 32 48-48 48 48 48-32-8 80"/><circle cx="40" cy="72" r="16"/><circle cx="128" cy="64" r="16"/><circle cx="216" cy="72" r="16"/></svg>
          <span class="info-label">Dificultad</span>
          <span class="info-value" id="info-dificultad"></span>
        </div>
        <div class="info-col">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><circle cx="88" cy="80" r="40"/><circle cx="168" cy="80" r="40"/><path d="M24 192c0-48 32-72 64-72s64 24 64 72"/><path d="M168 120c32 0 64 24 64 72"/></svg>
          <span class="info-label">Comensales</span>
          <span class="info-value" id="info-comensales"></span>
        </div>
      </div>
    </div>
  </section>

  <section class="ingredients-section">
    <div class="ingredients-section-inner">
      <h2 class="section-heading" style="margin-bottom:0;">
        Ingredientes
        <span class="ingredient-count" id="ingredient-count">0</span>
      </h2>
      <div class="ingredients-list" id="ingredients-list"></div>
    </div>
  </section>

  <section class="steps-section">
    <div class="steps-section-inner">
      <h2 class="section-heading" style="margin-bottom:0;">Elaboracion</h2>
      <div class="deco-line" style="margin:16px 0 24px;"></div>
      <div class="steps-list" id="steps-list"></div>
    </div>
  </section>

  <section class="final-image-section">
    <img src="" alt="" id="final-image" loading="lazy">
    <p class="final-caption">Resultado final</p>
  </section>

  <a href="" class="sticky-download-btn" id="download-btn" target="_blank" rel="noopener">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 256 256" fill="none" stroke="currentColor" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"><path d="M184 112v64a16 16 0 0 1-16 16H88a16 16 0 0 1-16-16v-64"/><polyline points="88 136 128 176 168 136"/><line x1="128" y1="176" x2="128" y2="40"/></svg>
    Descargar PDF de la receta
  </a>

  <footer class="page-footer">
    <p>&copy; 2026 Recetario Rafaél Núñez</p>
    <p class="footer-sub">Recetas tradicionales elaboradas con carino</p>
  </footer>

  <script>
    (function() {
      const pageName = window.location.pathname.split('/').pop();

      fetch('../data.json')
        .then(r => r.json())
        .then(data => {
          const recipe = data.recetas.find(r => r.html.includes(pageName));
          if (!recipe) return;

          document.title = recipe.titulo + ' | Recetario Rafael Nunez';

          var heroImg = document.getElementById('recipe-hero-img');
          if (heroImg) { heroImg.src = '../' + recipe.imagen; heroImg.alt = recipe.titulo; }

          var titleEl = document.getElementById('recipe-title');
          var descEl = document.getElementById('recipe-description');
          if (titleEl) titleEl.textContent = recipe.titulo;
          if (descEl) descEl.textContent = recipe.descripcion;

          var tEl = document.getElementById('info-tiempo');
          var dEl = document.getElementById('info-dificultad');
          var cEl = document.getElementById('info-comensales');
          if (tEl) tEl.textContent = recipe.tiempoLabel;
          if (dEl) dEl.textContent = recipe.dificultad;
          if (cEl) cEl.textContent = recipe.comensales + ' personas';

          // Ingredients
          var ingList = document.getElementById('ingredients-list');
          var countBadge = document.getElementById('ingredient-count');
          if (ingList) {
            var ingredients = recipe.ingredientes || [];
            if (countBadge) countBadge.textContent = ingredients.length;
            var storageKey = 'recipe-' + recipe.id + '-ingredients';
            var checkedIndices = [];
            try {
              var saved = localStorage.getItem(storageKey);
              if (saved) checkedIndices = JSON.parse(saved);
            } catch(e) { checkedIndices = []; }

            ingList.innerHTML = ingredients.map(function(ing, index) {
              var isChecked = checkedIndices.includes(index) ? 'checked' : '';
              return '<div class="ingredient-row">' +
                '<input type="checkbox" class="ingredient-checkbox" id="ing-' + index + '" data-index="' + index + '" ' + isChecked + '>' +
                '<label for="ing-' + index + '" class="ingredient-label">' +
                  '<span class="ingredient-name">' + ing.nombre + '</span>' +
                  '<span class="ingredient-qty">' + ing.cantidad + '</span>' +
                '</label>' +
              '</div>';
            }).join('');

            ingList.querySelectorAll('.ingredient-checkbox').forEach(function(cb) {
              cb.addEventListener('change', function() {
                var allChecked = Array.from(ingList.querySelectorAll('.ingredient-checkbox'))
                  .map(function(c, i) { return c.checked ? i : -1; })
                  .filter(function(i) { return i !== -1; });
                localStorage.setItem(storageKey, JSON.stringify(allChecked));
              });
            });
          }

          // Steps
          var stepsList = document.getElementById('steps-list');
          if (stepsList) {
            var steps = recipe.pasos || [];
            stepsList.innerHTML = steps.map(function(step, index) {
              return '<div class="step-card">' +
                '<span class="step-number">' + (index + 1) + '</span>' +
                '<p class="step-text">' + step + '</p>' +
              '</div>';
            }).join('');
          }

          // Final image
          var finalImg = document.getElementById('final-image');
          if (finalImg) { finalImg.src = '../' + recipe.imagen; finalImg.alt = 'Resultado final - ' + recipe.titulo; }

          // Download link
          var downloadBtn = document.getElementById('download-btn');
          if (downloadBtn) downloadBtn.href = '../' + recipe.pdf;
        })
        .catch(function(err) { console.error('Error cargando datos:', err); });
    })();
  </script>
</body>
</html>
